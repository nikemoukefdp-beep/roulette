<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roleta Russa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="screen-menu" class="screen active">
  <div class="menu-bg"></div>
  <h1 class="title">ROLETA<br>RUSSA</h1>
  <div class="difficulty-section">
    <p class="label">DIFICULDADE</p>
    <div class="diff-buttons">
      <button class="diff-btn active" data-diff="easy">FÁCIL</button>
      <button class="diff-btn" data-diff="medium">MÉDIO</button>
      <button class="diff-btn" data-diff="hard">DIFÍCIL</button>
    </div>
    <p class="diff-desc" id="diff-desc">Bot hesita mais. Spin frequente.</p>
  </div>
  <button class="start-btn" id="btn-start">JOGAR</button>
  <div class="rules-box">
    <p>🎲 1/6 chance de bala por gatilho</p>
    <p>🔄 SPIN reseta as chances (1x por turno)</p>
    <p>🎯 ATIRAR — você atira em si mesmo</p>
    <p>💀 ATIRAR OUTRO — atira no oponente</p>
  </div>
</div>

<div id="screen-spin" class="screen">
  <h2 class="spin-title">GIRANDO PARA VER QUEM COMEÇA...</h2>
  <div class="gun-center-wrap">
    <img id="gun-spinner" class="gun-spinner" src="" alt="pistola">
  </div>
  <p class="spin-result" id="spin-result"></p>
</div>

<div id="screen-game" class="screen">
  <div class="hud">
    <div class="hud-player">
      <span class="hud-label">VOCÊ</span>
      <div class="lives" id="player-lives"></div>
    </div>
    <div class="hud-center">
      <div class="bullet-indicator" id="bullet-indicator">
        <span class="bi-label">CÂMARA</span>
        <div class="chambers" id="chambers"></div>
      </div>
    </div>
    <div class="hud-bot">
      <div class="lives" id="bot-lives"></div>
      <span class="hud-label">BOT</span>
    </div>
  </div>

  <div class="arena">
    <div class="character-slot left" id="slot-player">
      <img class="char-img" id="img-player" src="" alt="player">
      <span class="char-label">VOCÊ</span>
    </div>

    <div class="center-gun-area" id="center-gun-area">
      <img id="center-gun" class="center-gun hidden" src="" alt="gun">
    </div>

    <div class="character-slot right" id="slot-bot">
      <img class="char-img" id="img-bot" src="" alt="bot">
      <span class="char-label">BOT</span>
    </div>
  </div>

  <div class="action-area" id="action-area">
    <div class="turn-indicator" id="turn-indicator">SEU TURNO</div>
    <div class="action-buttons" id="action-buttons">
      <button class="action-btn spin-btn" id="btn-spin">🔄 SPIN</button>
      <button class="action-btn shoot-btn" id="btn-shoot">🎯 ATIRAR</button>
      <button class="action-btn shoot-other-btn" id="btn-shoot-other">💀 ATIRAR OUTRO</button>
    </div>
    <p class="status-msg" id="status-msg"></p>
  </div>
</div>

<div id="screen-gameover" class="screen">
  <div class="gameover-content">
    <h2 class="gameover-title" id="gameover-title">GAME OVER</h2>
    <img class="gameover-img" id="gameover-img" src="" alt="">
    <p class="gameover-msg" id="gameover-msg"></p>
    <div class="gameover-buttons">
      <button class="start-btn" id="btn-restart">JOGAR DE NOVO</button>
      <button class="start-btn secondary" id="btn-menu">MENU</button>
    </div>
  </div>
</div>

<script src="images.js"></script>
<script src="game.js"></script>
</body>
</html>
